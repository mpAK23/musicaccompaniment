<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A simple, premium MusicXML player for accompaniment">
  <title>AccompanyMe - MusicXML Player</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=3">
</head>
<body>
  <div class="app-container">
    <header class="header">
      <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-music"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        <h1>AccompanyMe</h1>
      </div>
      <p class="subtitle">Upload MusicXML, select your instrument, and play along.</p>
    </header>

    <main class="main-content">
      <div class="upload-section glass-panel" id="drop-zone">
        <div class="upload-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
        </div>
        <h2>Drag & Drop your MusicXML file</h2>
        <p>or click to browse</p>
        <input type="file" id="file-input" accept=".xml,.musicxml" hidden>
        <div id="file-name" class="file-name">No file selected</div>
      </div>

      <div class="controls-section glass-panel">
        <div class="control-group">
          <label for="instrument-select">Instrument</label>
          <div class="select-wrapper">
            <select id="instrument-select">
              <optgroup label="Recorder Family">
                <option value="bass-recorder">Bass Recorder</option>
                <option value="alto-recorder">Alto Recorder</option>
                <option value="soprano-recorder" selected>Soprano Recorder</option>
              </optgroup>
              <optgroup label="Keyboards">
                <option value="acoustic_grand_piano">Piano</option>
                <option value="harpsichord">Harpsichord</option>
              </optgroup>
              <optgroup label="Strings">
                <option value="cello">Cello</option>
              </optgroup>
            </select>
          </div>
        </div>

        <div class="control-group">
          <label for="bpm-slider">Practice Tempo: <span id="bpm-val" style="color: var(--secondary-color);">120</span> BPM</label>
          <input type="range" id="bpm-slider" min="50" max="170" value="120" style="width: 100%; cursor: pointer;">
        </div>

        <div class="player-controls">
          <button id="play-btn" class="btn btn-primary" disabled>
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          </button>
          <button id="stop-btn" class="btn btn-secondary" disabled>
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="none"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/></svg>
          </button>
          
          <button id="export-btn" class="btn btn-secondary" style="width: auto; padding: 0 16px; border-radius: 8px; margin-left: 1rem; font-weight: 600; font-size: 0.9rem;" disabled>
            Export WAV
          </button>
        </div>
      </div>
      
      <div id="status-bar" class="status-bar">
        Waiting for file...
      </div>
      
      <div class="visualizer" id="visualizer">
        <!-- Bars generated by JS -->
      </div>
    </main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <script type="module" src="app.js?v=11"></script>
</body>
</html>
